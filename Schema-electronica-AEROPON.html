<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 0; background: transparent; }
svg { display: block; width: 100%; }
.node { cursor: pointer; }
.node:hover rect, .node:hover circle { opacity: 0.85; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 900" role="img">
<title>Schema electronică detaliată — sistem aeroponic</title>
<desc>Schema completă cu toate componentele: panouri solare, diodă, TP4056, baterie 18650, MT3608, ESP32-S3, OLED, LDR, senzor apă, ULN2003, motor stepper, releu dublu, pompă și ventilator 12V.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ═══════════════════════════════════════════
     BLOC 1: CIRCUIT SOLAR (sus)
     ═══════════════════════════════════════════ -->
<g class="node c-amber" onclick="sendPrompt('Cum functioneaza circuitul solar cu TP4056 si MT3608?')">
  <rect x="20" y="12" width="640" height="14" rx="4" stroke-width="0.5" opacity="0.4"/>
  <text class="ts" x="340" y="23" text-anchor="middle" dominant-baseline="central">Circuit solar 5V — alimentare electronică</text>
</g>

<!-- Panou 1 -->
<g class="node c-amber" onclick="sendPrompt('De ce conectam panourile in paralel si nu in serie?')">
  <rect x="20" y="36" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="62" y="54" text-anchor="middle" dominant-baseline="central">Panou 1</text>
  <text class="ts" x="62" y="70" text-anchor="middle" dominant-baseline="central">5V / 1W</text>
</g>
<!-- Panou 2 -->
<g class="node c-amber" onclick="sendPrompt('De ce conectam panourile in paralel si nu in serie?')">
  <rect x="20" y="88" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="62" y="106" text-anchor="middle" dominant-baseline="central">Panou 2</text>
  <text class="ts" x="62" y="122" text-anchor="middle" dominant-baseline="central">5V / 1W</text>
</g>
<!-- Panou 3 -->
<g class="node c-amber" onclick="sendPrompt('De ce conectam panourile in paralel si nu in serie?')">
  <rect x="20" y="140" width="84" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="62" y="158" text-anchor="middle" dominant-baseline="central">Panou 3</text>
  <text class="ts" x="62" y="174" text-anchor="middle" dominant-baseline="central">5V / 1W</text>
</g>

<!-- Nod paralel + panouri -->
<line x1="104" y1="58" x2="128" y2="58" stroke="var(--text-accent)" stroke-width="1.5"/>
<line x1="104" y1="110" x2="118" y2="110" stroke="var(--text-accent)" stroke-width="1.5"/>
<line x1="104" y1="162" x2="118" y2="162" stroke="var(--text-accent)" stroke-width="1.5"/>
<line x1="118" y1="58" x2="118" y2="162" stroke="var(--text-accent)" stroke-width="1.5"/>
<circle cx="118" cy="110" r="3" fill="var(--text-accent)"/>
<line x1="118" y1="110" x2="148" y2="110" stroke="var(--text-accent)" stroke-width="1.5"/>

<!-- GND panouri (linie albastră) -->
<line x1="104" y1="70" x2="130" y2="70" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="104" y1="122" x2="130" y2="122" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="104" y1="174" x2="130" y2="174" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="130" y1="70" x2="130" y2="174" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="130" y1="122" x2="148" y2="122" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>

<!-- Etichetă paralel -->
<text class="ts" x="118" y="96" text-anchor="middle" dominant-baseline="central" style="fill:var(--text-secondary)">||</text>

<!-- Diodă 1N5819 -->
<g class="node c-coral" onclick="sendPrompt('De ce folosim dioda 1N5819 Schottky si nu o dioda normala?')">
  <rect x="148" y="94" width="72" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="184" y="112" text-anchor="middle" dominant-baseline="central">1N5819</text>
  <text class="ts" x="184" y="128" text-anchor="middle" dominant-baseline="central">Schottky</text>
</g>
<line x1="220" y1="116" x2="244" y2="116" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TP4056 -->
<g class="node c-blue" onclick="sendPrompt('Cum functioneaza modulul TP4056 cu protectie DW01?')">
  <rect x="244" y="82" width="90" height="68" rx="6" stroke-width="0.5"/>
  <text class="th" x="289" y="104" text-anchor="middle" dominant-baseline="central">TP4056</text>
  <text class="ts" x="289" y="120" text-anchor="middle" dominant-baseline="central">+ DW01</text>
  <line x1="244" y1="130" x2="334" y2="130" stroke="var(--border)" stroke-width="0.5"/>
  <text class="ts" x="289" y="142" text-anchor="middle" dominant-baseline="central">IN+ / IN−</text>
</g>
<!-- GND TP4056 -->
<line x1="148" y1="122" x2="244" y2="122" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>

<!-- Baterie 18650 (#5) -->
<g class="node c-green" onclick="sendPrompt('De ce folosim o baterie separata pentru electronica de control?')">
  <rect x="244" y="174" width="90" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="289" y="192" text-anchor="middle" dominant-baseline="central">18650 #5</text>
  <text class="ts" x="289" y="208" text-anchor="middle" dominant-baseline="central">3.7V / solar</text>
</g>
<line x1="289" y1="150" x2="289" y2="174" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="299" y="163" dominant-baseline="central" style="fill:var(--text-secondary)">BAT+</text>

<!-- MT3608 -->
<g class="node c-purple" onclick="sendPrompt('Cum reglam MT3608 la 5V fix cu multimetrul?')">
  <rect x="244" y="242" width="90" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="289" y="262" text-anchor="middle" dominant-baseline="central">MT3608</text>
  <text class="ts" x="289" y="278" text-anchor="middle" dominant-baseline="central">Boost → 5V</text>
</g>
<line x1="289" y1="218" x2="289" y2="242" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="299" y="231" dominant-baseline="central" style="fill:var(--text-secondary)">OUT+</text>

<!-- Șină 5V -->
<g class="c-coral">
  <rect x="360" y="242" width="296" height="28" rx="6" stroke-width="0.5"/>
  <text class="th" x="508" y="256" text-anchor="middle" dominant-baseline="central">Șină 5V — alimentare centrală</text>
</g>
<line x1="334" y1="268" x2="360" y2="256" stroke="var(--text-accent)" stroke-width="2" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════
     BLOC 2: ESP32-S3 (centru)
     ═══════════════════════════════════════════ -->
<g class="node c-purple" onclick="sendPrompt('Care sunt toti pinii folositi pe ESP32-S3 si de ce am ales ADC1 pentru senzori?')">
  <rect x="220" y="330" width="240" height="220" rx="8" stroke-width="1"/>
  <text class="th" x="340" y="356" text-anchor="middle" dominant-baseline="central">ESP32-S3</text>
  <text class="ts" x="340" y="374" text-anchor="middle" dominant-baseline="central">DevKitC-1 · Wi-Fi</text>
  <line x1="220" y1="384" x2="460" y2="384" stroke="var(--border)" stroke-width="0.5"/>
  <!-- Pin list stânga -->
  <text class="ts" x="232" y="400" dominant-baseline="central">GPIO4 → releu pompă</text>
  <text class="ts" x="232" y="416" dominant-baseline="central">GPIO5 → releu ventilator</text>
  <text class="ts" x="232" y="432" dominant-baseline="central">GPIO6 → senzor apă VCC</text>
  <text class="ts" x="232" y="448" dominant-baseline="central">GPIO1 → senzor apă SIG</text>
  <text class="ts" x="232" y="464" dominant-baseline="central">GPIO2 → LDR stânga</text>
  <text class="ts" x="232" y="480" dominant-baseline="central">GPIO7 → LDR dreapta</text>
  <text class="ts" x="232" y="496" dominant-baseline="central">GPIO9  → OLED SDA</text>
  <text class="ts" x="232" y="512" dominant-baseline="central">GPIO10 → OLED SCL</text>
  <text class="ts" x="232" y="528" dominant-baseline="central">GPIO15-18 → stepper</text>
</g>

<!-- 5V → ESP32 -->
<line x1="460" y1="256" x2="460" y2="318" stroke="var(--text-accent)" stroke-width="1.5"/>
<line x1="460" y1="318" x2="430" y2="330" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="472" y="290" dominant-baseline="central" style="fill:var(--text-secondary)">5V0</text>

<!-- ═══════════════════════════════════════════
     BLOC 3: SENZORI (dreapta)
     ═══════════════════════════════════════════ -->

<!-- OLED -->
<g class="node c-blue" onclick="sendPrompt('Cum conectam OLED SSD1306 prin I2C la ESP32-S3?')">
  <rect x="510" y="330" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="584" y="350" text-anchor="middle" dominant-baseline="central">OLED 0.96"</text>
  <text class="ts" x="584" y="368" text-anchor="middle" dominant-baseline="central">SSD1306 · I²C</text>
</g>
<path d="M460 380 L510 356" fill="none" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text class="ts" x="480" y="372" style="fill:var(--text-secondary)">SDA/SCL</text>

<!-- LDR stânga -->
<g class="node c-green" onclick="sendPrompt('Cum functioneaza divisorul de tensiune cu LDR 5537 si rezistor 10k?')">
  <rect x="510" y="396" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="584" y="416" text-anchor="middle" dominant-baseline="central">LDR stânga</text>
  <text class="ts" x="584" y="434" text-anchor="middle" dominant-baseline="central">GL5537 + 10kΩ · GPIO2</text>
</g>
<line x1="460" y1="416" x2="510" y2="416" stroke="var(--text-accent)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LDR dreapta -->
<g class="node c-green" onclick="sendPrompt('Cum functioneaza divisorul de tensiune cu LDR 5537 si rezistor 10k?')">
  <rect x="510" y="462" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="584" y="482" text-anchor="middle" dominant-baseline="central">LDR dreapta</text>
  <text class="ts" x="584" y="500" text-anchor="middle" dominant-baseline="central">GL5537 + 10kΩ · GPIO7</text>
</g>
<line x1="460" y1="480" x2="510" y2="480" stroke="var(--text-accent)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Senzor apă -->
<g class="node c-teal" onclick="sendPrompt('Cum conectam cei 3 pini ai senzorului de apa la ESP32?')">
  <rect x="510" y="528" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="584" y="548" text-anchor="middle" dominant-baseline="central">Senzor apă</text>
  <text class="ts" x="584" y="566" text-anchor="middle" dominant-baseline="central">+→GPIO6 · S→GPIO1</text>
</g>
<line x1="460" y1="530" x2="510" y2="548" stroke="var(--text-accent)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════
     BLOC 4: STEPPER (stânga)
     ═══════════════════════════════════════════ -->
<!-- ULN2003 -->
<g class="node c-gray" onclick="sendPrompt('Cum conectam ULN2003 si motorul 28BYJ-48 la ESP32?')">
  <rect x="20" y="330" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="94" y="350" text-anchor="middle" dominant-baseline="central">ULN2003</text>
  <text class="ts" x="94" y="368" text-anchor="middle" dominant-baseline="central">GPIO15-18</text>
</g>
<path d="M220 490 L168 362" fill="none" stroke="var(--text-accent)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Motor stepper -->
<g class="node c-gray" onclick="sendPrompt('Cum functioneaza motorul pas cu pas 28BYJ-48 in solar tracker?')">
  <rect x="20" y="400" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="94" y="420" text-anchor="middle" dominant-baseline="central">28BYJ-48</text>
  <text class="ts" x="94" y="438" text-anchor="middle" dominant-baseline="central">Motor stepper</text>
</g>
<line x1="94" y1="382" x2="94" y2="400" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════
     BLOC 5: CIRCUIT 12V (jos)
     ═══════════════════════════════════════════ -->
<g class="c-coral">
  <rect x="20" y="596" width="640" height="14" rx="4" stroke-width="0.5" opacity="0.4"/>
  <text class="ts" x="340" y="606" text-anchor="middle" dominant-baseline="central">Circuit 12V — alimentare pompă și ventilator</text>
</g>

<!-- 4× 18650 serie -->
<g class="node c-green" onclick="sendPrompt('Cum conectam 4 baterii 18650 in serie si de ce 4S pentru 12V?')">
  <rect x="20" y="624" width="148" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="94" y="644" text-anchor="middle" dominant-baseline="central">4× 18650</text>
  <text class="ts" x="94" y="662" text-anchor="middle" dominant-baseline="central">Serie · 14.8-16.8V</text>
</g>
<line x1="168" y1="650" x2="200" y2="650" stroke="var(--text-accent)" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Releu dublu -->
<g class="node c-blue" onclick="sendPrompt('Cum conectam modulul releu SRD-05VDC la ESP32 si la circuitul de 12V?')">
  <rect x="200" y="614" width="200" height="72" rx="6" stroke-width="0.5"/>
  <text class="th" x="300" y="638" text-anchor="middle" dominant-baseline="central">Releu dublu</text>
  <text class="ts" x="300" y="654" text-anchor="middle" dominant-baseline="central">SRD-05VDC-SL-C</text>
  <line x1="200" y1="664" x2="400" y2="664" stroke="var(--border)" stroke-width="0.5"/>
  <text class="ts" x="240" y="678" dominant-baseline="central">IN1 ← GPIO4</text>
  <text class="ts" x="330" y="678" dominant-baseline="central">IN2 ← GPIO5</text>
</g>

<!-- Semnal control GPIO4/5 → releu -->
<path d="M340 550 L340 590 L300 614" fill="none" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="578" dominant-baseline="central" style="fill:var(--text-secondary)">GPIO4/5</text>

<!-- Pompă -->
<g class="node c-teal" onclick="sendPrompt('Cum conectam pompa de apa 12V la releul 1?')">
  <rect x="430" y="614" width="110" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="485" y="634" text-anchor="middle" dominant-baseline="central">Pompă</text>
  <text class="ts" x="485" y="652" text-anchor="middle" dominant-baseline="central">12V DC</text>
</g>
<line x1="400" y1="638" x2="430" y2="638" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="415" y="630" text-anchor="middle" dominant-baseline="central" style="fill:var(--text-secondary)">NO</text>

<!-- Ventilator -->
<g class="node c-teal" onclick="sendPrompt('Cum conectam ventilatorul 12V DC la releul 2?')">
  <rect x="560" y="614" width="100" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="610" y="634" text-anchor="middle" dominant-baseline="central">Ventilator</text>
  <text class="ts" x="610" y="652" text-anchor="middle" dominant-baseline="central">12V DC</text>
</g>
<line x1="400" y1="662" x2="540" y2="662" stroke="var(--text-accent)" stroke-width="1.5"/>
<line x1="540" y1="662" x2="560" y2="640" stroke="var(--text-accent)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="475" y="675" text-anchor="middle" dominant-baseline="central" style="fill:var(--text-secondary)">NO</text>

<!-- ═══════════════════════════════════════════
     GND COMUN (jos)
     ═══════════════════════════════════════════ -->
<rect x="20" y="720" width="640" height="28" rx="6" fill="none" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="5 3"/>
<text class="ts" x="340" y="734" text-anchor="middle" dominant-baseline="central" style="fill:var(--text-secondary)">GND comun — unește: MT3608 GND · ESP32 GND · Releu GND · Circuit 12V GND</text>

<!-- Linii GND jos -->
<line x1="94" y1="676" x2="94" y2="720" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="300" y1="686" x2="300" y2="720" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="485" y1="666" x2="485" y2="720" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="289" y1="294" x2="289" y2="760" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
<line x1="289" y1="760" x2="340" y2="748" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════
     LEGENDĂ
     ═══════════════════════════════════════════ -->
<rect x="20" y="760" width="640" height="50" rx="6" fill="none" stroke="var(--border)" stroke-width="0.5"/>
<text class="ts" x="30" y="780" dominant-baseline="central" style="fill:var(--text-secondary)">Legendă:</text>
<line x1="80" y1="780" x2="110" y2="780" stroke="var(--text-accent)" stroke-width="2"/>
<text class="ts" x="114" y="780" dominant-baseline="central" style="fill:var(--text-secondary)">alimentare (+)</text>
<line x1="210" y1="780" x2="240" y2="780" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="4 2"/>
<text class="ts" x="244" y="780" dominant-baseline="central" style="fill:var(--text-secondary)">GND / semnal</text>
<line x1="350" y1="780" x2="380" y2="780" stroke="var(--text-secondary)" stroke-width="1" stroke-dasharray="5 3"/>
<text class="ts" x="384" y="780" dominant-baseline="central" style="fill:var(--text-secondary)">I²C (SDA/SCL)</text>
<text class="ts" x="30" y="800" dominant-baseline="central" style="fill:var(--text-muted)">Click pe orice bloc pentru detalii suplimentare</text>
</svg>
</body>
</html>
